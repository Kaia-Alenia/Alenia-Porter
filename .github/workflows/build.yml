name: Build Alenia Porter v5.9

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      verified: ${{ steps.set-verified.outputs.verified }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard pywebview pillow requests

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Copy FFmpeg binaries to package
        run: |
          $ErrorActionPreference = 'Stop'
          mkdir src\alenia_porter\bin
          $ffmpegPath = (Get-Command ffmpeg -CommandType Application).Path
          $ffprobePath = (Get-Command ffprobe -CommandType Application).Path
          Copy-Item $ffmpegPath src\alenia_porter\bin\ffmpeg.exe
          Copy-Item $ffprobePath src\alenia_porter\bin\ffprobe.exe
          Get-ChildItem src\alenia_porter\bin

      - name: Build frontend
        working-directory: frontend_v2
        run: |
          npm install
          npm run build

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --windows-console-mode=disable --enable-plugin=pywebview --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-dir=frontend_v2/dist=frontend_v2/dist --include-data-files=src/alenia_porter/bin/ffmpeg.exe=alenia_porter/bin/ffmpeg.exe --include-data-files=src/alenia_porter/bin/ffprobe.exe=alenia_porter/bin/ffprobe.exe --windows-icon-from-ico=src/alenia_porter/assets/images/logo.ico --output-filename=AleniaPorter.exe porter_launcher.py

      - name: Smoke test executable
        run: |
          if (Test-Path ALENIA_ERROR.txt) { Remove-Item ALENIA_ERROR.txt }
          & porter_launcher.dist\AleniaPorter.exe --headless
          if ($LASTEXITCODE -ne 0) {
            echo "El ejecutable fallo con codigo de salida $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          if (Test-Path ALENIA_ERROR.txt) {
            echo "Se detectaron errores fatales durante el arranque:"
            Get-Content ALENIA_ERROR.txt
            exit 1
          }

      - name: Package build
        run: |
          copy LICENSE porter_launcher.dist\
          ren porter_launcher.dist AleniaPorter
          7z a AleniaPorter-Windows.zip AleniaPorter\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-Windows
          path: AleniaPorter-Windows.zip

      - name: Mark verified
        id: set-verified
        run: |
          if (Test-Path AleniaPorter-Windows.zip) {
            echo "verified=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "verified=false" >> $env:GITHUB_OUTPUT
            exit 1
          }

  build-macos:
    runs-on: macos-latest
    outputs:
      verified: ${{ steps.set-verified.outputs.verified }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard pywebview pillow requests pyobjc pyobjc-framework-WebKit

      - name: Download and extract FFmpeg for macOS
        run: |
          mkdir -p src/alenia_porter/bin
          FFMPEG_URL="https://evermeet.cx/ffmpeg/getrelease/zip"
          FFPROBE_URL="https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          if ! curl -L --fail -o ffmpeg.zip "$FFMPEG_URL"; then
            echo "Error: no se pudo descargar ffmpeg desde $FFMPEG_URL"
            exit 1
          fi
          if ! curl -L --fail -o ffprobe.zip "$FFPROBE_URL"; then
            echo "Error: no se pudo descargar ffprobe desde $FFPROBE_URL"
            exit 1
          fi
          unzip ffmpeg.zip -d src/alenia_porter/bin/
          unzip ffprobe.zip -d src/alenia_porter/bin/
          chmod +x src/alenia_porter/bin/ffmpeg src/alenia_porter/bin/ffprobe
          rm *.zip

      - name: Build frontend
        working-directory: frontend_v2
        run: |
          npm install
          npm run build

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --macos-disable-console --macos-create-app-bundle --enable-plugin=pywebview --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-dir=frontend_v2/dist=frontend_v2/dist --include-data-files=src/alenia_porter/bin/ffmpeg=alenia_porter/bin/ffmpeg --include-data-files=src/alenia_porter/bin/ffprobe=alenia_porter/bin/ffprobe --macos-app-icon=src/alenia_porter/assets/images/logo.ico --output-filename=AleniaPorter porter_launcher.py


      - name: Smoke test executable
        run: |
          rm -f ALENIA_ERROR.txt
          ./porter_launcher.dist/AleniaPorter.app/Contents/MacOS/AleniaPorter --headless
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "El ejecutable fallo con codigo de salida $STATUS"
            exit $STATUS
          fi
          if [ -f ALENIA_ERROR.txt ]; then
            echo "Se detectaron errores fatales durante el arranque:"
            cat ALENIA_ERROR.txt
            exit 1
          fi

      - name: Package build
        run: |
          cp LICENSE porter_launcher.dist/
          mv porter_launcher.dist AleniaPorter
          zip -r AleniaPorter-macOS.zip AleniaPorter

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-macOS
          path: AleniaPorter-macOS.zip

      - name: Mark verified
        id: set-verified
        run: |
          if [ -f AleniaPorter-macOS.zip ]; then
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      verified: ${{ steps.set-verified.outputs.verified }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard pywebview pillow requests
          sudo apt-get update && sudo apt-get install -y xvfb python3-gi python3-gi-cairo gir1.2-webkit2-4.0 libgirepository1.0-dev

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Copy FFmpeg binaries to package
        run: |
          mkdir -p src/alenia_porter/bin
          cp $(which ffmpeg) src/alenia_porter/bin/
          cp $(which ffprobe) src/alenia_porter/bin/

      - name: Build frontend
        working-directory: frontend_v2
        run: |
          npm install
          npm run build

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --enable-plugin=pywebview --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-dir=frontend_v2/dist=frontend_v2/dist --include-data-files=src/alenia_porter/bin/ffmpeg=alenia_porter/bin/ffmpeg --include-data-files=src/alenia_porter/bin/ffprobe=alenia_porter/bin/ffprobe --output-filename=AleniaPorter porter_launcher.py

      - name: Smoke test executable
        run: |
          rm -f ALENIA_ERROR.txt
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" ./porter_launcher.dist/AleniaPorter --headless
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "El ejecutable fallo con codigo de salida $STATUS"
            exit $STATUS
          fi
          if [ -f ALENIA_ERROR.txt ]; then
            echo "Se detectaron errores fatales durante el arranque:"
            cat ALENIA_ERROR.txt
            exit 1
          fi

      - name: Package build
        run: |
          cp LICENSE porter_launcher.dist/
          mv porter_launcher.dist AleniaPorter
          tar -czf AleniaPorter-Linux.tar.gz AleniaPorter

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-Linux
          path: AleniaPorter-Linux.tar.gz

      - name: Mark verified
        id: set-verified
        run: |
          if [ -f AleniaPorter-Linux.tar.gz ]; then
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  snyk-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  release:
    needs: [build-windows, build-macos, build-linux, snyk-security]
    if: ${{ needs.build-windows.outputs.verified == 'true' && needs.build-macos.outputs.verified == 'true' && needs.build-linux.outputs.verified == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/AleniaPorter-Windows/AleniaPorter-Windows.zip
            artifacts/AleniaPorter-macOS/AleniaPorter-macOS.zip
            artifacts/AleniaPorter-Linux/AleniaPorter-Linux.tar.gz
