name: Build Alenia Porter v3.0

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pydub requests

      - name: Download and extract FFmpeg
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
          Get-ChildItem -Path ffmpeg_temp -Filter ffmpeg.exe -Recurse | Copy-Item -Destination bin/
          Get-ChildItem -Path ffmpeg_temp -Filter ffprobe.exe -Recurse | Copy-Item -Destination bin/
          Remove-Item -Path ffmpeg.zip
          Remove-Item -Recurse -Force -Path ffmpeg_temp

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --windowed --onedir --contents-directory internal --add-data "logo.ico;." --add-data "locales;locales" --add-data "bin;bin" --icon=logo.ico --name="AleniaPorter" main.py

      - name: Copy License file to build directory
        run: |
          copy LICENSE dist\AleniaPorter\

      - name: Archive build directory
        run: |
          powershell Compress-Archive -Path dist/AleniaPorter -DestinationPath AleniaPorter.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-Windows
          path: AleniaPorter.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AleniaPorter.zip
