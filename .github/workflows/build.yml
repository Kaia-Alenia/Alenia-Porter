name: Build Alenia Porter v5.9

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard git+https://github.com/Kaia-Alenia/alenia-zenith.git

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Copy FFmpeg binaries to package
        run: |
          $ErrorActionPreference = 'Stop'
          mkdir src\alenia_porter\bin
          $ffmpegPath = (Get-Command ffmpeg -CommandType Application).Path
          $ffprobePath = (Get-Command ffprobe -CommandType Application).Path
          Copy-Item $ffmpegPath src\alenia_porter\bin\ffmpeg.exe
          Copy-Item $ffprobePath src\alenia_porter\bin\ffprobe.exe
          Get-ChildItem src\alenia_porter\bin

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --windows-console-mode=disable --enable-plugin=tk-inter --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-files=src/alenia_porter/bin/ffmpeg.exe=alenia_porter/bin/ffmpeg.exe --include-data-files=src/alenia_porter/bin/ffprobe.exe=alenia_porter/bin/ffprobe.exe --windows-icon-from-ico=src/alenia_porter/assets/images/logo.ico --output-filename=AleniaPorter.exe porter_launcher.py

      - name: Smoke test executable
        run: |
          porter_launcher.dist\AleniaPorter.exe --headless

      - name: Package build
        run: |
          copy LICENSE porter_launcher.dist\
          ren porter_launcher.dist AleniaPorter
          powershell Compress-Archive -Path AleniaPorter -DestinationPath AleniaPorter-Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-Windows
          path: AleniaPorter-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard imageio git+https://github.com/Kaia-Alenia/alenia-zenith.git

      - name: Download and extract FFmpeg for macOS
        run: |
          mkdir -p src/alenia_porter/bin
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip ffmpeg.zip -d src/alenia_porter/bin/
          unzip ffprobe.zip -d src/alenia_porter/bin/
          rm *.zip

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --macos-disable-console --enable-plugin=tk-inter --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-files=src/alenia_porter/bin/ffmpeg=alenia_porter/bin/ffmpeg --include-data-files=src/alenia_porter/bin/ffprobe=alenia_porter/bin/ffprobe --macos-app-icon=src/alenia_porter/assets/images/logo.ico --output-filename=AleniaPorter porter_launcher.py

      - name: Smoke test executable
        run: |
          porter_launcher.dist/AleniaPorter --headless

      - name: Package build
        run: |
          cp LICENSE porter_launcher.dist/
          mv porter_launcher.dist AleniaPorter
          zip -r AleniaPorter-macOS.zip AleniaPorter

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-macOS
          path: AleniaPorter-macOS.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard git+https://github.com/Kaia-Alenia/alenia-zenith.git
          sudo apt-get update && sudo apt-get install -y python3-tk ffmpeg

      - name: Copy FFmpeg binaries to package
        run: |
          mkdir -p src/alenia_porter/bin
          cp $(which ffmpeg) src/alenia_porter/bin/
          cp $(which ffprobe) src/alenia_porter/bin/

      - name: Build executable with Nuitka
        env:
          PYTHONPATH: src
        run: |
          python -m nuitka --standalone --enable-plugin=tk-inter --include-package=alenia_porter --include-module=unicodedata --include-data-dir=src/alenia_porter/assets=alenia_porter/assets --include-data-files=src/alenia_porter/bin/ffmpeg=alenia_porter/bin/ffmpeg --include-data-files=src/alenia_porter/bin/ffprobe=alenia_porter/bin/ffprobe --output-filename=AleniaPorter porter_launcher.py

      - name: Smoke test executable
        run: |
          porter_launcher.dist/AleniaPorter --headless

      - name: Package build
        run: |
          cp LICENSE porter_launcher.dist/
          mv porter_launcher.dist AleniaPorter
          tar -czf AleniaPorter-Linux.tar.gz AleniaPorter

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleniaPorter-Linux
          path: AleniaPorter-Linux.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AleniaPorter-Windows/AleniaPorter-Windows.zip
            artifacts/AleniaPorter-macOS/AleniaPorter-macOS.zip
            artifacts/AleniaPorter-Linux/AleniaPorter-Linux.tar.gz
